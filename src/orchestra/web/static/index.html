<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestra Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

<!-- ── Setup Screen (shown when no project is connected) ── -->
<div id="setup-screen" class="setup-screen hidden">
  <div class="setup-card">
    <h1>Orchestra</h1>
    <p class="setup-subtitle">Multi-Agent Coworking System</p>

    <div class="setup-section">
      <label>Project Directory</label>
      <div class="path-input-row">
        <input type="text" id="setup-path" placeholder="~/code/my-project" value="~">
        <button class="btn" onclick="setupBrowse(document.getElementById('setup-path').value)">Browse</button>
      </div>
    </div>

    <div id="setup-browser" class="dir-browser"></div>

    <div id="setup-info" class="setup-info hidden"></div>

    <div class="setup-section">
      <label>Tracked Branch (optional)</label>
      <div class="path-input-row">
        <input type="text" id="setup-tracked-branch" placeholder="main" />
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">
        每次启动时自动 fetch 并 checkout 到此分支的最新 commit
      </div>
    </div>

    <button id="btn-setup-init" class="btn btn-primary btn-lg" onclick="setupInit()">
      Initialize Orchestra
    </button>
  </div>
</div>

<!-- ── Dashboard (shown when project is connected) ── -->
<div id="dashboard" class="hidden">

<header>
  <div class="header-left">
    <h1>Orchestra</h1>
    <span class="subtitle" id="project-label">Multi-Agent Coworking</span>
  </div>
  <div class="header-right">
    <div id="agent-status" class="agent-bar"></div>
    <button id="btn-auto-accept" class="btn" title="Toggle auto-accept after FI">Auto-Accept: OFF</button>
    <div class="watch-group">
      <button id="btn-watch" class="btn" title="Toggle issue watching">Watch: OFF</button>
      <button id="btn-watch-tags" class="btn-icon" title="Edit watch labels">&#9881;</button>
      <div id="tag-editor" class="tag-editor hidden">
        <div class="tag-editor-header">Watch Labels</div>
        <div id="tag-pills" class="tag-pills"></div>
        <div class="tag-input-row">
          <input type="text" id="tag-input" placeholder="Add label..." />
          <button class="btn" onclick="addWatchTag()">Add</button>
        </div>
        <div class="tag-editor-divider"></div>
        <div class="tag-editor-header">Focus Issues</div>
        <div id="focus-pills" class="tag-pills"></div>
        <div class="tag-input-row">
          <input type="number" id="focus-input" placeholder="#123" min="1" />
          <button class="btn" onclick="addFocusIssue()">Add</button>
        </div>
      </div>
    </div>
    <button id="btn-discussions" class="btn" title="View tracked discussions">Discussions</button>
    <button id="btn-git-fetch" class="btn" title="Fetch remote">↻ Fetch</button>
    <button id="btn-tracked-branch" class="btn" title="Set tracked branch">分支: —</button>
    <button id="btn-switch" class="btn" title="Switch project">Switch Project</button>
    <button id="btn-submit" class="btn btn-primary">+ Submit Requirement</button>
  </div>
</header>

<main>
  <section id="graph-panel" class="panel">
    <div class="panel-header">
      <span>Feature Graph</span>
      <div class="legend">
        <span class="dot dot-proposal"></span>Proposed
        <span class="dot dot-idea"></span>Idea
        <span class="dot dot-assigned"></span>Assigned
        <span class="dot dot-in_progress"></span>In Progress
        <span class="dot dot-implemented"></span>Implemented
        <span class="dot dot-testing"></span>Testing
        <span class="dot dot-review"></span>Review
        <span class="dot dot-done"></span>Done
      </div>
    </div>
    <div id="graph-container">
      <svg id="dag-svg"></svg>
    </div>
  </section>

  <div id="resize-h" class="resizer resizer-h" title="Drag to resize"></div>
  <section id="detail-panel" class="panel">
    <div class="panel-header">
      <span id="detail-title">Select a node</span>
      <div>
        <button id="btn-show-agents" class="btn" style="font-size:11px;padding:3px 8px">Agents</button>
        <button id="btn-close-detail" class="btn-icon" title="Close">&times;</button>
      </div>
    </div>
    <div id="detail-content">
      <div class="empty-state">Click a node in the graph to view details</div>
    </div>
  </section>
</main>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <h2>Submit Requirement</h2>
    <textarea id="input-requirement" rows="6" placeholder="Describe what you want to build..."></textarea>
    <div class="modal-actions">
      <button id="btn-cancel" class="btn">Cancel</button>
      <button id="btn-do-submit" class="btn btn-primary">Submit to Head Leader</button>
    </div>
  </div>
</div>

<div id="resize-v" class="resizer resizer-v" title="Drag to resize"></div>
<footer id="event-log">
  <div class="log-tabs">
    <button class="log-tab active" data-tab="events">Events</button>
    <button class="log-tab" data-tab="agents">Agent Logs</button>
    <button class="log-tab" data-tab="drafts">Drafts <span id="drafts-count" class="drafts-badge hidden">0</span></button>
    <button class="log-tab" data-tab="issues">Issues</button>
  </div>
  <div id="tab-events" class="log-tab-content active">
    <div id="log-entries"></div>
  </div>
  <div id="tab-agents" class="log-tab-content">
    <div id="agent-log-entries"></div>
  </div>
  <div id="tab-drafts" class="log-tab-content">
    <div id="drafts-list"></div>
  </div>
  <div id="tab-issues" class="log-tab-content">
    <div id="issues-toolbar" class="issues-toolbar">
      <div class="issues-filters">
        <button class="issues-filter active" data-state="open">Open</button>
        <button class="issues-filter" data-state="closed">Closed</button>
        <button class="issues-filter" data-state="all">All</button>
      </div>
      <button class="btn" style="font-size:11px;padding:2px 8px" onclick="fetchIssues()">Refresh</button>
    </div>
    <div id="issues-list"></div>
  </div>
</footer>

</div><!-- /dashboard -->

<script src="/static/app.js?v=2"></script>
</body>
</html>
